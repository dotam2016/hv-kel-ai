    <path d="M1230 760c70-110 250-115 330-20 95 112 250 78 310-35"/>
    <path d="M1260 820c90-85 220-60 295 25 75 82 210 88 315 0"/>
  </g>
  <g fill="#38bdf8" opacity="0.75" filter="url(#glow)">
