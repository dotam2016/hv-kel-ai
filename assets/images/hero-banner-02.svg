<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Medical and healthcare connectivity concept</title>
  <desc id="desc">High-density connector and medical data network visualization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fcff"/>
      <stop offset="0.55" stop-color="#d9f0fb"/>
      <stop offset="1" stop-color="#10293a"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" x2="1">
      <stop offset="0" stop-color="#e9f4f9"/>
      <stop offset="0.48" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a9c3d3"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1480" cy="360" r="360" fill="#38bdf8" opacity="0.18" filter="url(#blur)"/>
