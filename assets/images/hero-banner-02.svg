    <rect x="70" y="245" width="400" height="72" rx="16" fill="#c8dbe7" opacity="0.54"/>
    <rect x="70" y="350" width="400" height="72" rx="16" fill="#c8dbe7" opacity="0.54"/>
    <g stroke="#7ba9c2" stroke-width="14" stroke-linecap="round" opacity="0.42">
      <path d="M-90 225h105"/><path d="M-90 275h105"/><path d="M-90 325h105"/><path d="M-90 375h105"/><path d="M-90 425h105"/>
      <path d="M525 225h145"/><path d="M525 275h145"/><path d="M525 325h145"/><path d="M525 375h145"/><path d="M525 425h145"/>
    </g>
  </g>
  <g stroke="url(#line)" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#glow)">
