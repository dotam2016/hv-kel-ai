<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Future connectivity concept</title>
  <desc id="desc">Abstract futuristic connector with luminous signal lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecf7ff"/>
      <stop offset="0.48" stop-color="#d8e8f2"/>
      <stop offset="1" stop-color="#0f2435"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#d8e4ec"/>
      <stop offset="0.52" stop-color="#f8fbfd"/>
      <stop offset="1" stop-color="#8aa5b8"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#dff9ff"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="350" cy="320" r="230" fill="#ffffff" opacity="0.28" filter="url(#softBlur)"/>
  <circle cx="1520" cy="260" r="320" fill="#0d80c0" opacity="0.2" filter="url(#softBlur)"/>
  <g opacity="0.18" stroke="#0d80c0" stroke-width="2" fill="none">
    <path d="M0 720 C290 620 360 750 650 620 S1110 520 1390 650 1740 730 1920 610"/>
    <path d="M0 810 C360 660 520 830 820 710 S1260 600 1530 760 1770 850 1920 760"/>
  </g>
  <g transform="translate(740 255) rotate(-11)">
    <rect x="0" y="150" width="650" height="250" rx="24" fill="url(#metal)" opacity="0.94"/>
    <rect x="465" y="115" width="280" height="320" rx="34" fill="#eaf4fa" opacity="0.72"/>
    <rect x="500" y="155" width="190" height="72" rx="10" fill="#b6cad8" opacity="0.7"/>
    <rect x="500" y="250" width="190" height="72" rx="10" fill="#b6cad8" opacity="0.7"/>
    <path d="M-580 212H50" stroke="url(#blueLine)" stroke-width="18" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M-560 274H90" stroke="url(#blueLine)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M-550 334H70" stroke="url(#blueLine)" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M630 212h690" stroke="url(#blueLine)" stroke-width="18" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M680 274h620" stroke="url(#blueLine)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M650 334h680" stroke="url(#blueLine)" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>
  </g>
  <g stroke="#38bdf8" stroke-width="3" fill="none" opacity="0.45" filter="url(#glow)">
    <path d="M420 560h180v-80h170"/>
    <path d="M420 610h240v90h130"/>
    <path d="M1180 500h180v-75h185"/>
    <path d="M1200 610h250v90h150"/>
  </g>
  <g fill="#38bdf8" opacity="0.7">
    <circle cx="600" cy="480" r="6"/><circle cx="790" cy="480" r="6"/><circle cx="660" cy="700" r="6"/><circle cx="1545" cy="425" r="6"/><circle cx="1600" cy="700" r="6"/>
  </g>
</svg>
