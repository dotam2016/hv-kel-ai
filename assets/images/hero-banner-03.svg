<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Industrial automation and rack connectivity concept</title>
  <desc id="desc">Rack system, backplane connector, and industrial data flow visualization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfd"/>
      <stop offset="0.46" stop-color="#d7e9f3"/>
      <stop offset="1" stop-color="#0f1f2e"/>
    </linearGradient>
    <linearGradient id="rack" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef6fa"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8aa7ba"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1450" cy="740" r="380" fill="#0d80c0" opacity="0.18" filter="url(#blur)"/>
  <circle cx="550" cy="320" r="250" fill="#ffffff" opacity="0.32" filter="url(#blur)"/>
  <g transform="translate(955 210) rotate(-7)">
    <rect x="0" y="95" width="510" height="530" rx="34" fill="url(#rack)" opacity="0.96"/>
    <rect x="55" y="150" width="400" height="80" rx="12" fill="#bdd0dd" opacity="0.54"/>
    <rect x="55" y="260" width="400" height="80" rx="12" fill="#bdd0dd" opacity="0.54"/>
    <rect x="55" y="370" width="400" height="80" rx="12" fill="#bdd0dd" opacity="0.54"/>
    <rect x="55" y="480" width="400" height="80" rx="12" fill="#bdd0dd" opacity="0.54"/>
    <g fill="#38bdf8" opacity="0.75" filter="url(#glow)">
      <circle cx="105" cy="190" r="8"/><circle cx="105" cy="300" r="8"/><circle cx="105" cy="410" r="8"/><circle cx="105" cy="520" r="8"/>
    </g>
    <g stroke="#6e93a8" stroke-width="10" stroke-linecap="round" opacity="0.38">
      <path d="M-150 190H35"/><path d="M-150 300H35"/><path d="M-150 410H35"/><path d="M-150 520H35"/>
      <path d="M475 190H690"/><path d="M475 300H690"/><path d="M475 410H690"/><path d="M475 520H690"/>
    </g>
  </g>
  <g stroke="url(#line)" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M80 735H510c125 0 140-120 260-120h360"/>
    <path d="M130 635H450c115 0 140-80 245-80h420"/>
    <path d="M90 510H480c150 0 165-130 330-130h960"/>
    <path d="M1420 690h420"/>
  </g>
  <g opacity="0.22" stroke="#0d80c0" stroke-width="2" fill="none">
    <path d="M260 255h180v-65h250"/><path d="M260 305h260v60h210"/><path d="M260 355h120v110h300"/>
    <path d="M1320 250h210v-90h260"/><path d="M1330 330h260v85h250"/>
  </g>
  <g fill="#38bdf8" opacity="0.72" filter="url(#glow)">
    <circle cx="510" cy="735" r="7"/><circle cx="770" cy="615" r="7"/><circle cx="450" cy="635" r="7"/><circle cx="695" cy="555" r="7"/><circle cx="480" cy="510" r="7"/><circle cx="810" cy="380" r="7"/>
  </g>
</svg>
